@(loginUrl: String, telemetryUrl: String)
<html>
    <head>
        <title>
            Redirecting to login...
        </title>
        <script>
            const image = new Image();
            image.src = `@Html(telemetryUrl)&path=${window.location.pathname}`;            
            setTimeout(function() {
                window.location.href = "@loginUrl";
            }, 250);
        </script>
    </head>
    <body>
        <h1>Redirecting to login...</h1>
    </body>
</html>
