@(userJson: String, telemetryUrl: String)
<!DOCTYPE html>
<html>
<head lang="en">
  <meta charset="UTF-8">
  <title></title>
    <script>(this.parent || this.opener).postMessage(@Html(userJson), '*');</script>
    <script type="module">
        const image = new Image();
        image.src = `@Html(telemetryUrl)&path=${window.location.pathname}`;
    </script>
</head>
<body>
You are logged in.
</body>
</html>
